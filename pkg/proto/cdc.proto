syntax = "proto3";

package milvus.proto.cdc;
option go_package="github.com/milvus-io/milvus/pkg/v2/proto/cdcpb";

import "milvus.proto";

enum ReplicateState {
  None    = 0;
  Init    = 1;
  Running = 2;
  Failed  = 3;
}

message ReplicateConfiguration {
  string replicateID                          = 1;
  ReplicateState state                        = 2;
  string reason                               = 3;
  milvus.ReplicateConfiguration configuration = 4;
}
