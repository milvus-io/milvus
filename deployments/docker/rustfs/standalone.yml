version: '3.5'

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  rustfs:
    # RustFS: High-performance S3-compatible object storage system
    # Visit https://github.com/rustfs/rustfs for more information
    image: docker.io/rustfs/rustfs:latest
    container_name: milvus-rustfs
    environment:
      # RustFS basic configuration
      - RUSTFS_ADDRESS=:9000
      - RUSTFS_CONSOLE_ADDRESS=:9001
      - RUSTFS_VOLUMES=/data/volume{1..4}

      # S3-compatible access credentials
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin

      # Logging configuration
      - RUST_LOG=info,rustfs=debug

      # Performance optimization settings
      - RUSTFS_OBJECT_GET_TIMEOUT=30
      - RUSTFS_OBJECT_DUPLEX_BUFFER_SIZE=4194304
      - RUSTFS_OBJECT_MAX_CONCURRENT_DISK_READS=64
      - RUSTFS_OBJECT_LOCK_OPTIMIZATION_ENABLE=true
      - RUSTFS_OBJECT_PRIORITY_SCHEDULING_ENABLE=true

      # Capacity statistics configuration
      - RUSTFS_CAPACITY_SCHEDULED_INTERVAL=300
      - RUSTFS_CAPACITY_WRITE_TRIGGER_DELAY=10

      # Runtime configuration
      - RUSTFS_RUNTIME_WORKER_THREADS=16
      - RUSTFS_RUNTIME_MAX_BLOCKING_THREADS=1024
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/rustfs:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: rustfs:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "rustfs"

networks:
  default:
    name: milvus
